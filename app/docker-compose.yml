services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: paradigmdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: localtestpassword
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d paradigmdb"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: paradigmdb
      DB_USER: appuser
      DB_PASSWORD: localtestpassword
    depends_on:
      db:
        condition: service_healthy